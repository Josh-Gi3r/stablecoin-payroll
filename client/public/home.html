<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stablecoin Payroll — Platform Overview</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Theme tokens — configure in your brand theme file */
  --primary:      #0e7a52;
  --primary-pale: #e6f4ee;
  --bg:     #f0f5f2;
  --text:   #0c1f16;
  --muted:  #557060;
  --border: #d0e4d8;
  --card:   #ffffff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}

.container {
  max-width: 680px;
  text-align: center;
}

h1 {
  font-size: 40px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text);
}

h1 span { color: var(--primary); }

p {
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 32px;
  line-height: 1.7;
}

a.btn {
  display: inline-block;
  background: var(--primary);
  color: #fff;
  font-weight: 700;
  font-size: 14px;
  padding: 12px 28px;
  border-radius: 100px;
  text-decoration: none;
}
</style>
</head>
<body>
<div class="container">
  <h1>Stablecoin <span>Payroll</span></h1>
  <p>
    Multi-currency stablecoin payroll with inline FX settlement, statutory modules for MY and SG,
    EOR contracts, and pluggable provider adapters. Configure the platform in <code>.env</code>
    and start your seed with <code>pnpm db:seed</code>.
  </p>
  <a href="/app" class="btn">Go to Platform</a>
</div>
</body>
</html>
